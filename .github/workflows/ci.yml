        working-directory: ./outlet-app
        run: npm run build

  test-customer-app:
    name: Build Customer App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install Dependencies
        working-directory: ./customer-app
        run: npm install
      - name: Build
        working-directory: ./customer-app
        run: npm run build
